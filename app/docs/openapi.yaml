        - $ref: "#/components/parameters/PaginationLimit"
        - $ref: "#/components/parameters/PaginationCursor"
      responses:
        "200":
          description: Decisions list
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AIDecisionsListResponse" }
        "400": { $ref: "#/components/responses/ErrorResponse" }
        "401": { $ref: "#/components/responses/ErrorResponse" }

  /scores:
    get:
      tags: [Scores]
      operationId: scoresList
      summary: List daily scores by range
      parameters:
        - $ref: "#/components/parameters/FromDate"
        - $ref: "#/components/parameters/ToDate"
        - $ref: "#/components/parameters/PaginationLimit"
        - $ref: "#/components/parameters/PaginationCursor"
      responses:
        "200":
          description: Scores list
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ScoresListResponse" }
        "400": { $ref: "#/components/responses/ErrorResponse" }
        "401": { $ref: "#/components/responses/ErrorResponse" }

  /progress/summary:
    get:
      tags: [Scores]
      operationId: progressSummary
      summary: Progress summary (non-jargon)
      parameters:
        - in: query
          name: range
          required: false
          schema: { type: string, default: "28d" }
      responses:
        "200":
          description: Summary
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ProgressSummaryResponse" }
